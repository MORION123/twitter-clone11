<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Instagram Clone - Сообщения</title>
    <link rel="stylesheet" href="css/style.css">
    <link id="theme-style" rel="stylesheet" href="css/light-theme.css">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="/icon-180.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Instagram Clone">
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <button class="back-btn" onclick="window.location.href='feed.html'">←</button>
            <h2>Сообщения</h2>
            <button class="new-message-btn" onclick="openNewChat()">✏️</button>
        </div>
    </nav>
    
    <div class="messages-container">
        <div id="chats-list" class="chats-list"></div>
    </div>
    
    <div class="bottom-nav">
        <button class="bottom-nav-item" onclick="window.location.href='feed.html'">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 9L12 3L21 9L12 15L3 9Z"/>
                <path d="M3 15L12 21L21 15"/>
            </svg>
        </button>
        <button class="bottom-nav-item" onclick="window.location.href='explore.html'">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="3"/>
                <path d="M21 12C21 16.97 16.97 21 12 21C7.03 21 3 16.97 3 12C3 7.03 7.03 3 12 3"/>
                <path d="M12 3L21 12"/>
            </svg>
        </button>
        <button class="bottom-nav-item" onclick="window.location.href='reels.html'">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="2" y="2" width="20" height="20" rx="2"/>
                <path d="M10 8L16 12L10 16V8Z"/>
            </svg>
        </button>
        <button class="bottom-nav-item active" onclick="window.location.href='messages.html'">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 16V20C21 20.5304 20.7893 21.0391 20.4142 21.4142C20.0391 21.7893 19.5304 22 19 22H5C4.46957 22 3.96086 21.7893 3.58579 21.4142C3.21071 21.0391 3 20.5304 3 20V16"/>
                <path d="M17 8L12 13L7 8"/>
                <path d="M12 3V13"/>
            </svg>
        </button>
        <button class="bottom-nav-item" onclick="window.location.href='profile.html'">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21V19C20 16.8 18.2 15 16 15H8C5.8 15 4 16.8 4 19V21"/>
                <circle cx="12" cy="7" r="4"/>
            </svg>
        </button>
    </div>
    
    <div id="new-chat-modal" class="modal">
        <div class="modal-content">
            <h3>Новое сообщение</h3>
            <input type="text" id="chat-search" placeholder="Поиск пользователей..." onkeyup="searchUsersForChat()">
            <div id="users-list" class="users-list"></div>
        </div>
    </div>
    
    <script>
        let allUsers = [];
        
        async function loadChats() {
            const currentUser = window.supabase.getCurrentUser();
            if (!currentUser) {
                window.location.href = 'index.html';
                return;
            }
            
            const container = document.getElementById('chats-list');
            container.innerHTML = '<div style="text-align: center; padding: 40px;">✉️ Загрузка...</div>';
            
            // Показываем просто список пользователей для чата
            const result = await window.supabase.searchUsers('');
            if (result.success) {
                allUsers = result.users.filter(u => u.id !== currentUser.id);
                if (allUsers.length === 0) {
                    container.innerHTML = '<div style="text-align: center; padding: 40px;">Нет пользователей для чата</div>';
                } else {
                    container.innerHTML = allUsers.map(user => `
                        <div class="chat-item" onclick="openChat('${user.username}')">
                            <div class="avatar-medium" style="background-image: url('${user.avatar || ''}'); background-size: cover;">${!user.avatar ? (user.username[0]?.toUpperCase() || '👤') : ''}</div>
                            <div style="flex: 1;">
                                <div><strong>${escapeHtml(user.username)}</strong></div>
                                <div style="font-size: 12px; color: #8e8e8e;">${user.bio || 'Напишите сообщение'}</div>
                            </div>
                        </div>
                    `).join('');
                }
            }
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function openChat(username) {
            window.location.href = `chat.html?user=${username}`;
        }
        
        function openNewChat() {
            document.getElementById('new-chat-modal').style.display = 'flex';
            searchUsersForChat();
        }
        
        function closeNewChat() {
            document.getElementById('new-chat-modal').style.display = 'none';
        }
        
        async function searchUsersForChat() {
            const query = document.getElementById('chat-search').value;
            const currentUser = window.supabase.getCurrentUser();
            
            let filteredUsers = allUsers;
            if (query.trim()) {
                filteredUsers = allUsers.filter(u => u.username.toLowerCase().includes(query.toLowerCase()));
            }
            
            const container = document.getElementById('users-list');
            if (filteredUsers.length === 0) {
                container.innerHTML = '<div style="padding: 20px; text-align: center;">Пользователи не найдены</div>';
            } else {
                container.innerHTML = filteredUsers.map(user => `
                    <div class="chat-item" onclick="startChat('${user.username}')">
                        <div class="avatar-medium" style="background-image: url('${user.avatar || ''}'); background-size: cover;">${!user.avatar ? (user.username[0]?.toUpperCase() || '👤') : ''}</div>
                        <div>
                            <div><strong>${escapeHtml(user.username)}</strong></div>
                            <div style="font-size: 12px; color: #8e8e8e;">${user.bio || ''}</div>
                        </div>
                    </div>
                `).join('');
            }
        }
        
        function startChat(username) {
            closeNewChat();
            openChat(username);
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            loadChats();
        });
        
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(console.log);
        }
    </script>
    <script src="js/theme.js"></script>
</body>
</html>

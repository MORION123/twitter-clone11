<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitter Clone - Лента</title>
    <link rel="stylesheet" href="css/style.css">
    <link id="theme-style" rel="stylesheet" href="css/light-theme.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">🐦 TwitterClone</div>
            <div class="search-bar">
                <input type="text" id="search-input" placeholder="Поиск постов и пользователей..." onkeyup="searchContent()">
                <div id="search-results" class="search-results"></div>
            </div>
            <div class="nav-links">
                <a href="feed.html" class="active">🏠 Лента</a>
                <a href="profile.html">👤 Профиль</a>
                <a href="#" id="logoutBtn">🚪 Выход</a>
                <button onclick="toggleTheme()" class="theme-switch">🌙</button>
            </div>
            <div class="user-info">
                <span id="current-user"></span>
            </div>
        </div>
    </nav>
    
    <div class="main-container">
        <aside class="sidebar">
            <div class="profile-card">
                <div id="profile-avatar" class="avatar-large" onclick="document.getElementById('avatar-upload').click()"></div>
                <input type="file" id="avatar-upload" accept="image/*" style="display: none" onchange="uploadAvatar()">
                <h3 id="profile-name"></h3>
                <p id="profile-bio"></p>
                <div class="stats">
                    <div><strong id="posts-count">0</strong> постов</div>
                    <div><strong id="followers-count">0</strong> подписчиков</div>
                    <div><strong id="following-count">0</strong> подписок</div>
                </div>
            </div>
            
            <div class="notifications">
                <h3>🔔 Уведомления</h3>
                <div id="notifications-list"></div>
            </div>
        </aside>
        
        <main class="main-content">
            <div class="create-post">
                <div class="post-input-container">
                    <div id="post-avatar" class="avatar-small"></div>
                    <textarea id="post-content" placeholder="Что нового?" rows="3"></textarea>
                </div>
                <div class="post-actions">
                    <button class="btn-image" onclick="document.getElementById('post-image').click()">📷</button>
                    <input type="file" id="post-image" accept="image/*" style="display: none">
                    <button class="btn-post" onclick="createPost()">Опубликовать</button>
                </div>
                <div id="post-preview"></div>
            </div>
            
            <div class="feed-tabs">
                <button class="feed-tab active" onclick="showFeed('following')">Для вас</button>
                <button class="feed-tab" onclick="showFeed('global')">Глобальная</button>
            </div>
            
            <div id="feed" class="feed"></div>
        </main>
        
        <aside class="sidebar-right">
            <div class="trending">
                <h3>📈 Актуальные темы</h3>
                <div id="trending-list"></div>
            </div>
            
            <div class="suggestions">
                <h3>👥 Кого читать</h3>
                <div id="suggestions-list"></div>
            </div>
        </aside>
    </div>
    
    <!-- Модальное окно для ответов -->
    <div id="reply-modal" class="modal">
        <div class="modal-content">
            <h3>Ответить</h3>
            <textarea id="reply-content" placeholder="Ваш ответ..." rows="3"></textarea>
            <div class="modal-buttons">
                <button onclick="submitReply()">Ответить</button>
                <button onclick="closeReplyModal()">Отмена</button>
            </div>
        </div>
    </div>
    
    <script src="js/storage.js"></script>
    <script src="js/app.js"></script>
    <script src="js/feed.js"></script>
    <script src="js/notifications.js"></script>
    <script src="js/theme.js"></script>
</body>
</html>

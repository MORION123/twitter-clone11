<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Instagram Clone - Лента</title>
    <link rel="stylesheet" href="css/style.css">
    <link id="theme-style" rel="stylesheet" href="css/light-theme.css">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="/icon-180.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Instagram Clone">
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo-instagram-nav">
                <h1>📸 Instagram</h1>
            </div>
            <div class="nav-icons">
                <button class="nav-icon" onclick="window.location.href='feed.html'">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 9L12 3L21 9L12 15L3 9Z"/>
                        <path d="M3 15L12 21L21 15"/>
                    </svg>
                </button>
                <button class="nav-icon" onclick="window.location.href='messages.html'">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 16V20C21 20.5304 20.7893 21.0391 20.4142 21.4142C20.0391 21.7893 19.5304 22 19 22H5C4.46957 22 3.96086 21.7893 3.58579 21.4142C3.21071 21.0391 3 20.5304 3 20V16"/>
                        <path d="M17 8L12 13L7 8"/>
                        <path d="M12 3V13"/>
                    </svg>
                </button>
                <button class="nav-icon theme-switch" onclick="toggleTheme()">🌙</button>
            </div>
        </div>
    </nav>
    
    <div class="stories-container">
        <div class="stories-scroll" id="stories-list"></div>
    </div>
    
    <div class="feed-container" id="feed"></div>
    
    <div class="bottom-nav">
        <button class="bottom-nav-item active" onclick="window.location.href='feed.html'">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 9L12 3L21 9L12 15L3 9Z"/>
                <path d="M3 15L12 21L21 15"/>
            </svg>
        </button>
        <button class="bottom-nav-item" onclick="window.location.href='explore.html'">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="3"/>
                <path d="M21 12C21 16.97 16.97 21 12 21C7.03 21 3 16.97 3 12C3 7.03 7.03 3 12 3"/>
                <path d="M12 3L21 12"/>
            </svg>
        </button>
        <button class="bottom-nav-item" onclick="window.location.href='reels.html'">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="2" y="2" width="20" height="20" rx="2"/>
                <path d="M10 8L16 12L10 16V8Z"/>
            </svg>
        </button>
        <button class="bottom-nav-item" onclick="window.location.href='messages.html'">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 16V20C21 20.5304 20.7893 21.0391 20.4142 21.4142C20.0391 21.7893 19.5304 22 19 22H5C4.46957 22 3.96086 21.7893 3.58579 21.4142C3.21071 21.0391 3 20.5304 3 20V16"/>
                <path d="M17 8L12 13L7 8"/>
                <path d="M12 3V13"/>
            </svg>
        </button>
        <button class="bottom-nav-item" onclick="window.location.href='profile.html'">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21V19C20 16.8 18.2 15 16 15H8C5.8 15 4 16.8 4 19V21"/>
                <circle cx="12" cy="7" r="4"/>
            </svg>
        </button>
    </div>
    
    <div id="create-post-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Создать публикацию</h3>
                <button onclick="closeCreatePostModal()" class="close-modal">&times;</button>
            </div>
            <div class="post-input-area">
                <textarea id="new-post-content" placeholder="Напишите подпись..." rows="3"></textarea>
                <div class="media-upload">
                    <button class="btn-image" onclick="document.getElementById('new-post-image').click()">📷 Добавить фото</button>
                    <button class="btn-image" onclick="document.getElementById('new-post-video').click()">🎥 Добавить видео</button>
                    <input type="file" id="new-post-image" accept="image/*" style="display: none">
                    <input type="file" id="new-post-video" accept="video/*" style="display: none">
                </div>
                <div class="location-input" style="margin: 12px 0;">
                    <button class="btn-location" onclick="getCurrentLocation()">📍 Добавить место</button>
                    <input type="text" id="post-location" placeholder="Или введите название места" style="width: 100%; margin-top: 8px; padding: 8px; border-radius: 8px;">
                </div>
                <div id="new-post-preview"></div>
                <button class="btn-post" onclick="createPostFromModal()">Опубликовать</button>
            </div>
        </div>
    </div>
    
    <div id="comments-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Комментарии</h3>
                <button onclick="closeCommentsModal()" class="close-modal">&times;</button>
            </div>
            <div id="comments-list" class="comments-list"></div>
            <div class="add-comment">
                <textarea id="new-comment" placeholder="Добавьте комментарий..." rows="2"></textarea>
                <button onclick="submitComment()">Отправить</button>
            </div>
        </div>
    </div>
    
    <script>
        let currentPostForComment = null;
        let currentLocation = null;
        
        function formatInstagramTime(timestamp) {
            const date = new Date(timestamp);
            const now = new Date();
            const diff = now - date;
            const minutes = Math.floor(diff / 60000);
            const hours = Math.floor(minutes / 60);
            const days = Math.floor(hours / 24);
            if (minutes < 1) return 'только что';
            if (minutes < 60) return `${minutes} мин назад`;
            if (hours < 24) return `${hours} ч назад`;
            if (days < 7) return `${days} дн назад`;
            return date.toLocaleDateString();
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function parseMentions(text) {
            const mentionRegex = /@(\w+)/g;
            let html = text;
            let match;
            while ((match = mentionRegex.exec(text)) !== null) {
                const username = match[1];
                html = html.replace(`@${username}`, `<span class="mention" style="color: #0095f6; cursor: pointer;" onclick="goToProfile('${username}')">@${username}</span>`);
            }
            return html;
        }
        
        function getCurrentLocation() {
            if (!navigator.geolocation) return;
            navigator.geolocation.getCurrentPosition(async (position) => {
                const { latitude, longitude } = position.coords;
                try {
                    const response = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${latitude}&lon=${longitude}&format=json`);
                    const data = await response.json();
                    currentLocation = data.display_name?.split(',')[0] || `${latitude.toFixed(4)}, ${longitude.toFixed(4)}`;
                    const locationInput = document.getElementById('post-location');
                    if (locationInput) locationInput.value = currentLocation;
                } catch (error) {
                    currentLocation = `${latitude.toFixed(4)}, ${longitude.toFixed(4)}`;
                }
            });
        }
        
        function renderPost(post) {
            const user = post.user || { username: 'user', avatar: null };
            const isLiked = false;
            const isSaved = false;
            
            return `
                <div class="post-card" data-post-id="${post.id}">
                    <div class="post-header">
                        <div class="post-avatar" style="background-image: url('${user.avatar || ''}'); background-size: cover;">${!user.avatar ? (user.username[0]?.toUpperCase() || '👤') : ''}</div>
                        <div class="post-user-info">
                            <div class="post-username" onclick="goToProfile('${user.username}')">${escapeHtml(user.username)}</div>
                            ${post.location ? `<div class="post-location" onclick="showOnMap('${post.location}')">📍 ${escapeHtml(post.location)}</div>` : ''}
                        </div>
                        <button class="action-icon" onclick="showPostOptions('${post.id}')" style="margin-left: auto;">⋯</button>
                    </div>
                    ${post.image ? `<img src="${post.image}" class="post-image" onclick="openImage('${post.image}')">` : ''}
                    ${post.video ? `<video src="${post.video}" class="post-image" controls onclick="event.stopPropagation()"></video>` : ''}
                    <div class="post-actions">
                        <button class="action-icon" onclick="toggleLike('${post.id}')">🤍</button>
                        <button class="action-icon" onclick="openCommentsModal('${post.id}')">💬</button>
                        <button class="action-icon" onclick="sharePost('${post.id}')">📤</button>
                        <button class="action-icon" style="margin-left: auto;" onclick="toggleSave('${post.id}')">🔖</button>
                    </div>
                    <div class="post-caption">
                        <span class="post-username" onclick="goToProfile('${user.username}')">${escapeHtml(user.username)}</span>
                        ${parseMentions(escapeHtml(post.content))}
                    </div>
                    <div class="post-time">${formatInstagramTime(post.timestamp)}</div>
                </div>
            `;
        }
        
        async function loadFeed() {
            const feedEl = document.getElementById('feed');
            if (!feedEl) return;
            
            feedEl.innerHTML = '<div style="text-align: center; padding: 40px;">📸 Загрузка...</div>';
            
            const result = await window.supabase.getFeed();
            
            if (result.success && result.posts.length > 0) {
                feedEl.innerHTML = result.posts.map(post => renderPost(post)).join('');
            } else {
                feedEl.innerHTML = `<div class="empty-feed"><p>📸</p><p><strong>Нет постов</strong></p><p style="font-size: 14px;">Подпишитесь на пользователей или создайте первый пост</p><button onclick="openCreatePostModal()" style="margin-top: 16px; padding: 10px 20px; background: #0095f6; color: white; border: none; border-radius: 8px;">Создать пост</button></div>`;
            }
        }
        
        async function toggleLike(postId) {
            const result = await window.supabase.toggleLike(postId);
            if (result.success) loadFeed();
        }
        
        async function addCommentToPost() {
            const commentText = document.getElementById('new-comment').value;
            if (!commentText.trim() || !currentPostForComment) return;
            
            const result = await window.supabase.addComment(currentPostForComment, commentText);
            if (result.success) {
                document.getElementById('new-comment').value = '';
                openCommentsModal(currentPostForComment);
                loadFeed();
            }
        }
        
        async function openCommentsModal(postId) {
            currentPostForComment = postId;
            const result = await window.supabase.getComments(postId);
            const commentsList = document.getElementById('comments-list');
            
            if (result.success && result.comments.length > 0) {
                commentsList.innerHTML = result.comments.map(comment => `
                    <div class="comment-item">
                        <div class="avatar-small" style="background-image: url('${comment.user?.avatar || ''}'); background-size: cover;">${!comment.user?.avatar ? (comment.user?.username[0] || '') : ''}</div>
                        <div style="flex: 1;">
                            <strong>${escapeHtml(comment.user?.username)}</strong> <span>${escapeHtml(comment.content)}</span>
                            <div style="font-size: 10px; color: #8e8e8e;">${formatInstagramTime(new Date(comment.created_at).getTime())}</div>
                        </div>
                    </div>
                `).join('');
            } else {
                commentsList.innerHTML = '<div style="text-align: center; padding: 20px;">Нет комментариев. Будьте первым!</div>';
            }
            
            document.getElementById('comments-modal').style.display = 'flex';
        }
        
        function closeCommentsModal() {
            document.getElementById('comments-modal').style.display = 'none';
            currentPostForComment = null;
        }
        
        function submitComment() {
            addCommentToPost();
        }
        
        async function createPostFromModal() {
            const content = document.getElementById('new-post-content').value;
            const imageInput = document.getElementById('new-post-image');
            const videoInput = document.getElementById('new-post-video');
            const location = document.getElementById('post-location').value;
            const user = window.supabase.getCurrentUser();
            
            if (!content.trim() && !imageInput.files[0] && !videoInput.files[0]) {
                alert('Напишите подпись или добавьте фото/видео');
                return;
            }
            
            if (imageInput.files[0]) {
                const uploadResult = await window.supabase.uploadPostImage(imageInput.files[0], user.id);
                if (uploadResult.success) {
                    await window.supabase.createPost(content, uploadResult.url, null, location);
                }
            } else if (videoInput.files[0]) {
                const uploadResult = await window.supabase.uploadFile(videoInput.files[0], 'posts', user.id);
                if (uploadResult.success) {
                    await window.supabase.createPost(content, null, uploadResult.url, location);
                }
            } else {
                await window.supabase.createPost(content, null, null, location);
            }
            
            closeCreatePostModal();
            loadFeed();
        }
        
        function openCreatePostModal() {
            document.getElementById('create-post-modal').style.display = 'flex';
            getCurrentLocation();
        }
        
        function closeCreatePostModal() {
            document.getElementById('create-post-modal').style.display = 'none';
            document.getElementById('new-post-content').value = '';
            document.getElementById('new-post-preview').innerHTML = '';
            document.getElementById('new-post-image').value = '';
            document.getElementById('new-post-video').value = '';
            document.getElementById('post-location').value = '';
            currentLocation = null;
        }
        
        function sharePost(postId) {
            navigator.clipboard.writeText(`${window.location.origin}${window.location.pathname}?post=${postId}`);
            alert('Ссылка на пост скопирована!');
        }
        
        function goToProfile(username) {
            window.location.href = `profile.html?user=${username}`;
        }
        
        function openImage(imageUrl) {
            window.open(imageUrl, '_blank');
        }
        
        function showOnMap(location) {
            window.open(`https://www.google.com/maps/search/${encodeURIComponent(location)}`, '_blank');
        }
        
        function showPostOptions(postId) {
            if (confirm('Удалить этот пост?')) {
                alert('Удаление пока не реализовано в Supabase версии');
            }
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            const user = window.supabase.getCurrentUser();
            if (!user) {
                window.location.href = 'index.html';
                return;
            }
            
            loadFeed();
            
            const imageInput = document.getElementById('new-post-image');
            const videoInput = document.getElementById('new-post-video');
            const preview = document.getElementById('new-post-preview');
            
            const updatePreview = (file, isVideo) => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    if (isVideo) {
                        preview.innerHTML = `<video src="${e.target.result}" style="max-width: 100%; border-radius: 8px; margin-top: 12px;" controls></video>`;
                    } else {
                        preview.innerHTML = `<img src="${e.target.result}" style="max-width: 100%; border-radius: 8px; margin-top: 12px;">`;
                    }
                };
                reader.readAsDataURL(file);
            };
            
            if (imageInput) imageInput.addEventListener('change', function() { if (this.files && this.files[0]) updatePreview(this.files[0], false); });
            if (videoInput) videoInput.addEventListener('change', function() { if (this.files && this.files[0]) updatePreview(this.files[0], true); });
        });
        
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(console.log);
        }
    </script>
    <script src="js/theme.js"></script>
</body>
</html>

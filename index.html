<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitter Clone - Вход</title>
    <link rel="stylesheet" href="css/style.css">
    <link id="theme-style" rel="stylesheet" href="css/light-theme.css">
</head>
<body>
    <div class="container">
        <div class="theme-toggle">
            <button onclick="toggleTheme()" class="theme-btn">🌙</button>
        </div>
        <div class="auth-box">
            <h1>🐦 Twitter Clone</h1>
            
            <div class="auth-tabs">
                <button class="tab-btn active" onclick="showTab('login')">Вход</button>
                <button class="tab-btn" onclick="showTab('register')">Регистрация</button>
            </div>
            
            <div id="login-form" class="auth-form active">
                <input type="text" id="login-username" placeholder="Имя пользователя">
                <input type="password" id="login-password" placeholder="Пароль">
                <button onclick="login()">Войти</button>
                <p id="login-error" class="error"></p>
            </div>
            
            <div id="register-form" class="auth-form">
                <input type="text" id="reg-username" placeholder="Имя пользователя">
                <input type="email" id="reg-email" placeholder="Email">
                <input type="password" id="reg-password" placeholder="Пароль">
                <button onclick="register()">Зарегистрироваться</button>
                <p id="reg-error" class="error"></p>
            </div>
        </div>
    </div>
    
    <script src="js/storage.js"></script>
    <script src="js/app.js"></script>
    <script src="js/theme.js"></script>
</body>
</html>

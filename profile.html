<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitter Clone - Профиль</title>
    <link rel="stylesheet" href="css/style.css">
    <link id="theme-style" rel="stylesheet" href="css/light-theme.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">🐦 TwitterClone</div>
            <div class="search-bar">
                <input type="text" id="search-input" placeholder="Поиск..." onkeyup="searchContent()">
                <div id="search-results" class="search-results"></div>
            </div>
            <div class="nav-links">
                <a href="feed.html">🏠 Лента</a>
                <a href="profile.html" class="active">👤 Профиль</a>
                <a href="#" id="logoutBtnProfile">🚪 Выход</a>
                <button onclick="toggleTheme()" class="theme-switch">🌙</button>
            </div>
            <div class="user-info">
                <span id="current-user"></span>
            </div>
        </div>
    </nav>
    
    <div class="profile-container">
        <div class="profile-header">
            <div class="profile-cover"></div>
            <div class="profile-info">
                <div id="profile-avatar-large" class="avatar-large-profile" onclick="document.getElementById('avatar-upload-profile').click()"></div>
                <input type="file" id="avatar-upload-profile" accept="image/*" style="display: none" onchange="uploadAvatarFromProfile()">
                <h1 id="profile-fullname"></h1>
                <p id="profile-username-display"></p>
                <p id="profile-bio-display"></p>
                <div class="profile-stats">
                    <div><strong id="profile-posts-count">0</strong> постов</div>
                    <div><strong id="profile-followers-count">0</strong> подписчиков</div>
                    <div><strong id="profile-following-count">0</strong> подписок</div>
                </div>
                <button id="edit-profile-btn" class="edit-profile-btn">✏️ Редактировать профиль</button>
            </div>
        </div>
        
        <div class="profile-tabs">
            <button class="profile-tab active" onclick="showUserPosts()">📝 Посты</button>
            <button class="profile-tab" onclick="showUserReplies()">💬 Ответы</button>
        </div>
        
        <div id="user-posts" class="feed"></div>
        <div id="user-replies" class="feed" style="display: none;"></div>
    </div>
    
    <!-- Модальное окно редактирования профиля -->
    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <h3>Редактировать профиль</h3>
            <textarea id="edit-bio" placeholder="О себе" maxlength="160" rows="3"></textarea>
            <div class="modal-buttons">
                <button onclick="saveProfile()">Сохранить</button>
                <button onclick="closeModal()">Отмена</button>
            </div>
        </div>
    </div>
    
    <script src="js/storage.js"></script>
    <script src="js/app.js"></script>
    <script src="js/profile.js"></script>
    <script src="js/notifications.js"></script>
    <script src="js/theme.js"></script>
</body>
</html>

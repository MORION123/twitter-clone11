<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Instagram Clone - Профиль</title>
    <link rel="stylesheet" href="css/style.css">
    <link id="theme-style" rel="stylesheet" href="css/light-theme.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo-instagram-nav">
                <h1>📸 Instagram</h1>
            </div>
            <div class="nav-icons">
                <button class="nav-icon" onclick="window.location.href='feed.html'">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                        <path d="M3 9L12 3L21 9L12 15L3 9Z" stroke="currentColor" stroke-width="2" fill="none"/>
                        <path d="M3 15L12 21L21 15" stroke="currentColor" stroke-width="2" fill="none"/>
                    </svg>
                </button>
                <button class="nav-icon" onclick="window.location.href='messages.html'">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                        <path d="M21 16V20C21 20.5304 20.7893 21.0391 20.4142 21.4142C20.0391 21.7893 19.5304 22 19 22H5C4.46957 22 3.96086 21.7893 3.58579 21.4142C3.21071 21.0391 3 20.5304 3 20V16" stroke="currentColor" stroke-width="2" fill="none"/>
                        <path d="M17 8L12 13L7 8" stroke="currentColor" stroke-width="2" fill="none"/>
                        <path d="M12 3V13" stroke="currentColor" stroke-width="2"/>
                    </svg>
                </button>
                <button class="nav-icon" onclick="window.location.href='profile.html'">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                        <path d="M20 21V19C20 16.8 18.2 15 16 15H8C5.8 15 4 16.8 4 19V21" stroke="currentColor" stroke-width="2" fill="none"/>
                        <circle cx="12" cy="7" r="4" stroke="currentColor" stroke-width="2" fill="none"/>
                    </svg>
                </button>
                <button class="nav-icon theme-switch" onclick="toggleTheme()">🌙</button>
            </div>
        </div>
    </nav>
    
    <div class="profile-container">
        <!-- Шапка профиля -->
        <div class="profile-header-instagram">
            <div class="profile-avatar-large" id="profile-avatar" onclick="document.getElementById('avatar-upload').click()">
                <div class="avatar-large-inner"></div>
            </div>
            <input type="file" id="avatar-upload" accept="image/*" style="display: none" onchange="uploadAvatar()">
            <div class="profile-stats-instagram">
                <div><strong id="posts-count">0</strong><span> публикаций</span></div>
                <div><strong id="followers-count">0</strong><span> подписчиков</span></div>
                <div><strong id="following-count">0</strong><span> подписок</span></div>
            </div>
        </div>
        
        <div class="profile-bio">
            <h3 id="profile-name"></h3>
            <p id="profile-bio-text"></p>
            <button id="edit-profile-btn" class="edit-profile-btn">Редактировать профиль</button>
        </div>
        
        <!-- Вкладки постов -->
        <div class="profile-tabs-instagram">
            <button class="profile-tab active" onclick="showUserPosts()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor" stroke-width="2" fill="none"/>
                    <path d="M8 3V21M16 3V21" stroke="currentColor" stroke-width="2"/>
                    <path d="M3 8H21M3 16H21" stroke="currentColor" stroke-width="2"/>
                </svg>
            </button>
            <button class="profile-tab" onclick="showSavedPosts()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <path d="M5 3H19C20.1 3 21 3.9 21 5V21L12 18L3 21V5C3 3.9 3.9 3 5 3Z" stroke="currentColor" stroke-width="2" fill="none"/>
                </svg>
            </button>
        </div>
        
        <!-- Сетка постов -->
        <div class="posts-grid" id="user-posts-grid"></div>
        <div class="posts-grid" id="saved-posts-grid" style="display: none;"></div>
    </div>
    
    <div class="bottom-nav">
        <button class="bottom-nav-item" onclick="window.location.href='feed.html'">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                <path d="M3 9L12 3L21 9L12 15L3 9Z" stroke="currentColor" stroke-width="2" fill="none"/>
                <path d="M3 15L12 21L21 15" stroke="currentColor" stroke-width="2" fill="none"/>
            </svg>
        </button>
        <button class="bottom-nav-item" onclick="window.location.href='messages.html'">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                <path d="M21 16V20C21 20.5304 20.7893 21.0391 20.4142 21.4142C20.0391 21.7893 19.5304 22 19 22H5C4.46957 22 3.96086 21.7893 3.58579 21.4142C3.21071 21.0391 3 20.5304 3 20V16" stroke="currentColor" stroke-width="2" fill="none"/>
                <path d="M17 8L12 13L7 8" stroke="currentColor" stroke-width="2" fill="none"/>
                <path d="M12 3V13" stroke="currentColor" stroke-width="2"/>
            </svg>
        </button>
        <button class="bottom-nav-item" onclick="openCreatePostModal()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                <path d="M12 4V20M4 12H20" stroke="currentColor" stroke-width="2"/>
            </svg>
        </button>
        <button class="bottom-nav-item active" onclick="window.location.href='profile.html'">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                <path d="M20 21V19C20 16.8 18.2 15 16 15H8C5.8 15 4 16.8 4 19V21" stroke="currentColor" stroke-width="2" fill="none"/>
                <circle cx="12" cy="7" r="4" stroke="currentColor" stroke-width="2" fill="none"/>
            </svg>
        </button>
    </div>
    
    <!-- Модальное окно редактирования профиля -->
    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <h3>Редактировать профиль</h3>
            <textarea id="edit-bio" placeholder="О себе" rows="3"></textarea>
            <div class="modal-buttons">
                <button onclick="saveProfile()">Сохранить</button>
                <button onclick="closeModal()">Отмена</button>
            </div>
        </div>
    </div>
    
    <script src="js/storage.js"></script>
    <script src="js/app.js"></script>
    <script src="js/profile.js"></script>
    <script src="js/theme.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Instagram Clone - Профиль</title>
    <link rel="stylesheet" href="css/style.css">
    <link id="theme-style" rel="stylesheet" href="css/light-theme.css">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="/icon-180.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Instagram Clone">
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo-instagram-nav">
                <h1>📸 Instagram</h1>
            </div>
            <div class="nav-icons">
                <button class="nav-icon" onclick="window.location.href='feed.html'">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 9L12 3L21 9L12 15L3 9Z"/>
                        <path d="M3 15L12 21L21 15"/>
                    </svg>
                </button>
                <button class="nav-icon" onclick="window.location.href='messages.html'">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 16V20C21 20.5304 20.7893 21.0391 20.4142 21.4142C20.0391 21.7893 19.5304 22 19 22H5C4.46957 22 3.96086 21.7893 3.58579 21.4142C3.21071 21.0391 3 20.5304 3 20V16"/>
                        <path d="M17 8L12 13L7 8"/>
                        <path d="M12 3V13"/>
                    </svg>
                </button>
                <button class="nav-icon theme-switch" onclick="toggleTheme()">🌙</button>
            </div>
        </div>
    </nav>
    
    <div class="profile-container">
        <div class="profile-header-instagram">
            <div class="profile-avatar-large" id="profile-avatar" onclick="document.getElementById('avatar-upload').click()">
                <div class="avatar-large-inner" id="profile-avatar-inner">👤</div>
            </div>
            <input type="file" id="avatar-upload" accept="image/*" style="display: none">
            <div class="profile-stats-instagram">
                <div><strong id="posts-count">0</strong><span> публикаций</span></div>
                <div><strong id="followers-count">0</strong><span> подписчиков</span></div>
                <div><strong id="following-count">0</strong><span> подписок</span></div>
            </div>
        </div>
        
        <div class="profile-bio">
            <h3 id="profile-name"></h3>
            <p id="profile-bio-text"></p>
            <button id="edit-profile-btn" class="edit-profile-btn">Редактировать профиль</button>
            <button id="export-data-btn" class="edit-profile-btn" onclick="exportUserData()">📥 Экспорт данных</button>
        </div>
        
        <div class="profile-tabs-instagram">
            <button class="profile-tab active" onclick="showUserPosts()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="18" height="18" rx="2"/>
                    <path d="M8 3V21M16 3V21"/>
                    <path d="M3 8H21M3 16H21"/>
                </svg>
            </button>
            <button class="profile-tab" onclick="showSavedPosts()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M5 3H19C20.1 3 21 3.9 21 5V21L12 18L3 21V5C3 3.9 3.9 3 5 3Z"/>
                </svg>
            </button>
            <button class="profile-tab" onclick="showReelsTab()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="2" y="2" width="20" height="20" rx="2"/>
                    <path d="M10 8L16 12L10 16V8Z"/>
                </svg>
            </button>
        </div>
        
        <div id="user-posts-grid" class="posts-grid"></div>
        <div id="saved-posts-grid" class="posts-grid" style="display: none;"></div>
        <div id="user-reels-grid" class="posts-grid" style="display: none;"></div>
    </div>
    
    <div class="bottom-nav">
        <button class="bottom-nav-item" onclick="window.location.href='feed.html'">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 9L12 3L21 9L12 15L3 9Z"/>
                <path d="M3 15L12 21L21 15"/>
            </svg>
        </button>
        <button class="bottom-nav-item" onclick="window.location.href='explore.html'">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="3"/>
                <path d="M21 12C21 16.97 16.97 21 12 21C7.03 21 3 16.97 3 12C3 7.03 7.03 3 12 3"/>
                <path d="M12 3L21 12"/>
            </svg>
        </button>
        <button class="bottom-nav-item" onclick="window.location.href='reels.html'">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="2" y="2" width="20" height="20" rx="2"/>
                <path d="M10 8L16 12L10 16V8Z"/>
            </svg>
        </button>
        <button class="bottom-nav-item" onclick="window.location.href='messages.html'">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 16V20C21 20.5304 20.7893 21.0391 20.4142 21.4142C20.0391 21.7893 19.5304 22 19 22H5C4.46957 22 3.96086 21.7893 3.58579 21.4142C3.21071 21.0391 3 20.5304 3 20V16"/>
                <path d="M17 8L12 13L7 8"/>
                <path d="M12 3V13"/>
            </svg>
        </button>
        <button class="bottom-nav-item active" onclick="window.location.href='profile.html'">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21V19C20 16.8 18.2 15 16 15H8C5.8 15 4 16.8 4 19V21"/>
                <circle cx="12" cy="7" r="4"/>
            </svg>
        </button>
    </div>
    
    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <h3>Редактировать профиль</h3>
            <textarea id="edit-bio" placeholder="О себе" rows="3"></textarea>
            <div class="modal-buttons">
                <button onclick="saveProfile()">Сохранить</button>
                <button onclick="closeModal()">Отмена</button>
            </div>
        </div>
    </div>
    
    <script>
        let currentProfileUser = null;
        let userPosts = [];
        let userReels = [];
        
        async function loadProfile() {
            const urlParams = new URLSearchParams(window.location.search);
            const username = urlParams.get('user');
            const currentUser = window.supabase.getCurrentUser();
            
            let profileData;
            if (username) {
                const result = await window.supabase.getUserProfile(username);
                if (result.success) profileData = result.user;
                else profileData = null;
            } else {
                const supabaseUser = await window.supabase.getCurrentSupabaseUser();
                if (supabaseUser) profileData = supabaseUser.profile;
            }
            
            if (!profileData) {
                window.location.href = 'feed.html';
                return;
            }
            
            currentProfileUser = profileData;
            const isOwnProfile = currentUser?.id === profileData.id;
            
            document.getElementById('profile-name').textContent = profileData.username;
            document.getElementById('profile-bio-text').textContent = profileData.bio || 'Нет описания';
            document.getElementById('posts-count').textContent = profileData.posts_count || 0;
            document.getElementById('followers-count').textContent = profileData.followers_count || 0;
            document.getElementById('following-count').textContent = profileData.following_count || 0;
            
            const avatarInner = document.getElementById('profile-avatar-inner');
            if (profileData.avatar) {
                avatarInner.style.backgroundImage = `url('${profileData.avatar}')`;
                avatarInner.style.backgroundSize = 'cover';
                avatarInner.textContent = '';
            } else {
                avatarInner.style.backgroundImage = '';
                avatarInner.textContent = profileData.username[0]?.toUpperCase() || '👤';
            }
            
            const editBtn = document.getElementById('edit-profile-btn');
            if (editBtn) {
                if (isOwnProfile) {
                    editBtn.style.display = 'block';
                    editBtn.textContent = 'Редактировать профиль';
                    editBtn.onclick = () => document.getElementById('edit-modal').style.display = 'flex';
                } else {
                    editBtn.style.display = 'block';
                    editBtn.textContent = 'Подписаться';
                    editBtn.onclick = () => followUser(profileData.id);
                }
            }
            
            // Загружаем посты
            const feedResult = await window.supabase.getFeed();
            if (feedResult.success) {
                userPosts = feedResult.posts.filter(p => p.userId === profileData.id);
                document.getElementById('posts-count').textContent = userPosts.length;
                showUserPosts();
            }
        }
        
        function showUserPosts() {
            const postsGrid = document.getElementById('user-posts-grid');
            const savedGrid = document.getElementById('saved-posts-grid');
            const reelsGrid = document.getElementById('user-reels-grid');
            const tabs = document.querySelectorAll('.profile-tab');
            
            postsGrid.style.display = 'grid';
            savedGrid.style.display = 'none';
            reelsGrid.style.display = 'none';
            tabs[0].classList.add('active');
            tabs[1].classList.remove('active');
            tabs[2].classList.remove('active');
            
            if (userPosts.length === 0) {
                postsGrid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 40px;"><p>📸</p><p><strong>Нет публикаций</strong></p></div>`;
                return;
            }
            
            postsGrid.innerHTML = userPosts.map(post => `
                <div class="grid-post" onclick="openPostModal('${post.id}')">
                    ${post.image ? `<img src="${post.image}" alt="Post">` : ''}
                    ${post.video ? `<video src="${post.video}" style="width:100%;height:100%;object-fit:cover;"></video>` : ''}
                </div>
            `).join('');
        }
        
        function showSavedPosts() {
            alert('Сохраненные посты будут доступны в следующей версии');
        }
        
        function showReelsTab() {
            alert('Reels будут доступны в следующей версии');
        }
        
        function openPostModal(postId) {
            alert('Просмотр поста будет доступен в следующей версии');
        }
        
        async function followUser(userId) {
            const result = await window.supabase.followUser(userId);
            if (result.success) {
                alert('Подписка оформлена!');
                loadProfile();
            }
        }
        
        async function uploadAvatar() {
            const fileInput = document.getElementById('avatar-upload');
            const file = fileInput.files[0];
            if (!file) return;
            
            const user = window.supabase.getCurrentUser();
            const result = await window.supabase.uploadAvatar(file, user.id);
            
            if (result.success) {
                await window.supabase.updateUserProfile(user.id, { avatar: result.url });
                alert('Аватар обновлен!');
                loadProfile();
            }
        }
        
        async function saveProfile() {
            const newBio = document.getElementById('edit-bio').value;
            const user = window.supabase.getCurrentUser();
            const result = await window.supabase.updateUserProfile(user.id, { bio: newBio });
            
            if (result.success) {
                alert('Профиль обновлен!');
                closeModal();
                loadProfile();
            }
        }
        
        async function exportUserData() {
            const result = await window.supabase.exportUserData();
            if (result.success) {
                alert('Данные экспортированы!');
            } else {
                alert('Ошибка экспорта: ' + result.error);
            }
        }
        
        function closeModal() {
            document.getElementById('edit-modal').style.display = 'none';
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            const user = window.supabase.getCurrentUser();
            if (!user) {
                window.location.href = 'index.html';
                return;
            }
            loadProfile();
            
            const avatarUpload = document.getElementById('avatar-upload');
            if (avatarUpload) avatarUpload.addEventListener('change', uploadAvatar);
        });
        
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(console.log);
        }
    </script>
    <script src="js/theme.js"></script>
</body>
</html>

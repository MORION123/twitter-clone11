<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Instagram Clone - Профиль</title>
    <link rel="stylesheet" href="css/style.css">
    <link id="theme-style" rel="stylesheet" href="css/light-theme.css">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="/icon-180.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Instagram Clone">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo-instagram-nav">
                <h1>📸 Instagram</h1>
            </div>
            <div class="nav-icons">
                <button class="nav-icon" onclick="window.location.href='feed.html'">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 9L12 3L21 9L12 15L3 9Z"/>
                        <path d="M3 15L12 21L21 15"/>
                    </svg>
                </button>
                <button class="nav-icon" onclick="window.location.href='messages.html'">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 16V20C21 20.5304 20.7893 21.0391 20.4142 21.4142C20.0391 21.7893 19.5304 22 19 22H5C4.46957 22 3.96086 21.7893 3.58579 21.4142C3.21071 21.0391 3 20.5304 3 20V16"/>
                        <path d="M17 8L12 13L7 8"/>
                        <path d="M12 3V13"/>
                    </svg>
                </button>
                <button class="nav-icon theme-switch" onclick="toggleTheme()">🌙</button>
            </div>
        </div>
    </nav>
    
    <div class="profile-container">
        <div class="profile-header-instagram">
            <div class="profile-avatar-large" id="profile-avatar" onclick="document.getElementById('avatar-upload').click()">
                <div class="avatar-large-inner"></div>
            </div>
            <input type="file" id="avatar-upload" accept="image/*" style="display: none" onchange="uploadAvatar()">
            <div class="profile-stats-instagram">
                <div><strong id="posts-count">0</strong><span> публикаций</span></div>
                <div><strong id="followers-count">0</strong><span> подписчиков</span></div>
                <div><strong id="following-count">0</strong><span> подписок</span></div>
            </div>
        </div>
        
        <div class="profile-bio">
            <h3 id="profile-name"></h3>
            <p id="profile-bio-text"></p>
            <button id="edit-profile-btn" class="edit-profile-btn">Редактировать профиль</button>
        </div>
        
        <div class="profile-tabs-instagram">
            <button class="profile-tab active" onclick="showUserPosts()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="18" height="18" rx="2"/>
                    <path d="M8 3V21M16 3V21"/>
                    <path d="M3 8H21M3 16H21"/>
                </svg>
            </button>
            <button class="profile-tab" onclick="showSavedPosts()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M5 3H19C20.1 3 21 3.9 21 5V21L12 18L3 21V5C3 3.9 3.9 3 5 3Z"/>
                </svg>
            </button>
        </div>
        
        <div id="user-posts-grid" class="posts-grid"></div>
        <div id="saved-posts-grid" class="posts-grid" style="display: none;"></div>
    </div>
    
    <div class="bottom-nav">
        <button class="bottom-nav-item" onclick="window.location.href='feed.html'">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 9L12 3L21 9L12 15L3 9Z"/>
                <path d="M3 15L12 21L21 15"/>
            </svg>
        </button>
        <button class="bottom-nav-item" onclick="window.location.href='explore.html'">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="3"/>
                <path d="M21 12C21 16.97 16.97 21 12 21C7.03 21 3 16.97 3 12C3 7.03 7.03 3 12 3"/>
                <path d="M12 3L21 12"/>
            </svg>
        </button>
        <button class="bottom-nav-item" onclick="window.location.href='messages.html'">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 16V20C21 20.5304 20.7893 21.0391 20.4142 21.4142C20.0391 21.7893 19.5304 22 19 22H5C4.46957 22 3.96086 21.7893 3.58579 21.4142C3.21071 21.0391 3 20.5304 3 20V16"/>
                <path d="M17 8L12 13L7 8"/>
                <path d="M12 3V13"/>
            </svg>
        </button>
        <button class="bottom-nav-item active" onclick="window.location.href='profile.html'">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21V19C20 16.8 18.2 15 16 15H8C5.8 15 4 16.8 4 19V21"/>
                <circle cx="12" cy="7" r="4"/>
            </svg>
        </button>
    </div>
    
    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <h3>Редактировать профиль</h3>
            <textarea id="edit-bio" placeholder="О себе" rows="3"></textarea>
            <div class="modal-buttons">
                <button onclick="saveProfile()">Сохранить</button>
                <button onclick="closeModal()">Отмена</button>
            </div>
        </div>
    </div>
    
    <script src="js/storage.js"></script>
    <script src="js/app.js"></script>
    <script src="js/profile.js"></script>
    <script src="js/theme.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(console.log);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Instagram Clone - Чат</title>
    <link rel="stylesheet" href="css/style.css">
    <link id="theme-style" rel="stylesheet" href="css/light-theme.css">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="/icon-180.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Instagram Clone">
    <style>
        .chat-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: inherit;
            padding-top: 65px;
        }
        .chat-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 12px 16px;
            border-bottom: 1px solid;
            display: flex;
            align-items: center;
            gap: 12px;
            backdrop-filter: blur(10px);
            z-index: 100;
            background: inherit;
        }
        .back-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
            display: flex;
            align-items: center;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .message {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 20px;
            font-size: 14px;
            word-wrap: break-word;
        }
        .message.sent {
            align-self: flex-end;
            background-color: #0095f6;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .message.received {
            align-self: flex-start;
            background-color: #efefef;
            color: black;
            border-bottom-left-radius: 4px;
        }
        .message-time {
            font-size: 10px;
            margin-top: 4px;
            opacity: 0.7;
        }
        .chat-input {
            padding: 12px 16px;
            border-top: 1px solid;
            display: flex;
            gap: 8px;
            background: inherit;
        }
        .chat-input input {
            flex: 1;
            padding: 12px;
            border: 1px solid;
            border-radius: 24px;
            outline: none;
            font-size: 14px;
        }
        .chat-input button {
            padding: 0 20px;
            background-color: #0095f6;
            color: white;
            border: none;
            border-radius: 24px;
            font-weight: bold;
            cursor: pointer;
        }
        .avatar-small {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <button class="back-btn" onclick="window.location.href='messages.html'">←</button>
            <div id="chat-avatar" class="avatar-small"></div>
            <div>
                <strong id="chat-username"></strong>
            </div>
        </div>
        
        <div class="chat-messages" id="chat-messages"></div>
        
        <div class="chat-input">
            <input type="text" id="message-input" placeholder="Напишите сообщение..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()">Отправить</button>
        </div>
    </div>
    
    <script src="js/storage.js"></script>
    <script src="js/app.js"></script>
    <script src="js/messages.js"></script>
    <script src="js/theme.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(console.log);
        }
    </script>
</body>
</html>

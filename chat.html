<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Instagram Clone - Чат</title>
    <link rel="stylesheet" href="css/style.css">
    <link id="theme-style" rel="stylesheet" href="css/light-theme.css">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="/icon-180.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Instagram Clone">
    <style>
        .chat-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: inherit;
            padding-top: 65px;
        }
        .chat-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 12px 16px;
            padding-top: calc(12px + env(safe-area-inset-top));
            border-bottom: 1px solid;
            display: flex;
            align-items: center;
            gap: 12px;
            backdrop-filter: blur(10px);
            z-index: 100;
            background: inherit;
        }
        .back-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
            display: flex;
            align-items: center;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .message {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 20px;
            font-size: 14px;
            word-wrap: break-word;
        }
        .message.sent {
            align-self: flex-end;
            background-color: #0095f6;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .message.received {
            align-self: flex-start;
            background-color: #efefef;
            color: black;
            border-bottom-left-radius: 4px;
        }
        .message-time {
            font-size: 10px;
            margin-top: 4px;
            opacity: 0.7;
        }
        .chat-input {
            padding: 12px 16px;
            padding-bottom: calc(12px + env(safe-area-inset-bottom));
            border-top: 1px solid;
            display: flex;
            gap: 8px;
            background: inherit;
        }
        .chat-input input {
            flex: 1;
            padding: 12px;
            border: 1px solid;
            border-radius: 24px;
            outline: none;
            font-size: 14px;
        }
        .chat-input button {
            padding: 0 20px;
            background-color: #0095f6;
            color: white;
            border: none;
            border-radius: 24px;
            font-weight: bold;
            cursor: pointer;
        }
        .avatar-small {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }
    </style>
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <button class="back-btn" onclick="window.location.href='messages.html'">←</button>
            <div id="chat-avatar" class="avatar-small"></div>
            <div>
                <strong id="chat-username"></strong>
            </div>
        </div>
        
        <div class="chat-messages" id="chat-messages"></div>
        
        <div class="chat-input">
            <input type="text" id="message-input" placeholder="Напишите сообщение..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()">Отправить</button>
        </div>
    </div>
    
    <script>
        let currentChatUser = null;
        let messageInterval = null;
        
        function formatTime(timestamp) {
            const date = new Date(timestamp);
            const now = new Date();
            const diff = now - date;
            const minutes = Math.floor(diff / 60000);
            const hours = Math.floor(minutes / 60);
            const days = Math.floor(hours / 24);
            if (minutes < 1) return 'только что';
            if (minutes < 60) return `${minutes} мин назад`;
            if (hours < 24) return `${hours} ч назад`;
            if (days < 7) return `${days} дн назад`;
            return date.toLocaleDateString();
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        async function loadChat() {
            const urlParams = new URLSearchParams(window.location.search);
            const username = urlParams.get('user');
            const currentUser = window.supabase.getCurrentUser();
            
            if (!currentUser) {
                window.location.href = 'index.html';
                return;
            }
            
            const profileResult = await window.supabase.getUserProfile(username);
            if (!profileResult.success) {
                window.location.href = 'messages.html';
                return;
            }
            
            currentChatUser = profileResult.user;
            
            document.getElementById('chat-username').textContent = currentChatUser.username;
            const avatarEl = document.getElementById('chat-avatar');
            if (currentChatUser.avatar) {
                avatarEl.style.backgroundImage = `url('${currentChatUser.avatar}')`;
                avatarEl.style.backgroundSize = 'cover';
                avatarEl.textContent = '';
            } else {
                avatarEl.style.backgroundImage = '';
                avatarEl.textContent = currentChatUser.username[0]?.toUpperCase() || '👤';
            }
            
            await loadMessages();
            startPolling();
        }
        
        async function loadMessages() {
            const currentUser = window.supabase.getCurrentUser();
            if (!currentUser || !currentChatUser) return;
            
            const result = await window.supabase.getMessagesWith(currentChatUser.id);
            const container = document.getElementById('chat-messages');
            
            if (result.success && result.messages.length > 0) {
                container.innerHTML = result.messages.map(msg => {
                    const isFromMe = msg.from_user_id === currentUser.id;
                    return `
                        <div class="message ${isFromMe ? 'sent' : 'received'}">
                            ${escapeHtml(msg.content || '')}
                            <div class="message-time">${formatTime(new Date(msg.created_at).getTime())}</div>
                        </div>
                    `;
                }).join('');
                container.scrollTop = container.scrollHeight;
            } else {
                container.innerHTML = '<div style="text-align: center; padding: 40px;">Нет сообщений. Напишите что-нибудь!</div>';
            }
        }
        
        async function sendMessage() {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            if (!text || !currentChatUser) return;
            
            const result = await window.supabase.sendMessage(currentChatUser.id, text);
            if (result.success) {
                input.value = '';
                await loadMessages();
            }
        }
        
        function startPolling() {
            if (messageInterval) clearInterval(messageInterval);
            messageInterval = setInterval(() => {
                if (currentChatUser) loadMessages();
            }, 3000);
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            loadChat();
        });
        
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(console.log);
        }
    </script>
    <script src="js/theme.js"></script>
</body>
</html>
